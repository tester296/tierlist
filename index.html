<!DOCTYPE html>
<html>
<head>
<title>PvP Leaderboard</title>

<style>
body {background:#0b1220;color:white;font-family:Arial;}
.container {max-width:1000px;margin:auto;padding:30px;}
h1{text-align:center;margin-bottom:20px;}

.tabs{
display:flex;gap:10px;overflow-x:auto;justify-content:center;margin-bottom:20px;
}
.tab{
padding:8px 14px;border-radius:10px;background:#111827;
cursor:pointer;opacity:.7;
}
.tab.active{opacity:1;background:#1f2937;}

.player{
display:flex;align-items:center;
max-width:750px;margin:12px auto;
padding:16px 20px;background:#111827;border-radius:12px;
}

.left{display:flex;gap:10px;align-items:center;}

.right{
margin-left:auto;
display:flex;
gap:10px;
}

/* ICON */
.iconBox{
display:flex;
flex-direction:column;
align-items:center;
position:relative;
cursor:pointer;
}

.circle{
width:38px;height:38px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
border:2px solid;background:#0f172a;
}

.tier{font-size:10px;margin-top:3px;}

/* TOOLTIP */
.tooltip{
position:absolute;
bottom:55px;
background:#111827;
padding:6px 10px;
border-radius:8px;
font-size:11px;
opacity:0;
transition:0.2s;
white-space:nowrap;
border:1px solid rgba(255,255,255,0.1);
}
.iconBox:hover .tooltip{opacity:1;}

/* COLORS */
.ht1,.lt1{color:#ffd700;border-color:#ffd700;}
.ht2,.lt2{color:#c0c0c0;border-color:#c0c0c0;}
.ht3,.lt3{color:#cd7f32;border-color:#cd7f32;}
.ht4,.lt4{color:#6b7280;border-color:#6b7280;}
.ht5,.lt5{color:#4b5563;border-color:#4b5563;}

.controls{text-align:center;margin-top:20px;}
button{
padding:8px 12px;margin:5px;border-radius:8px;
border:none;background:#3b82f6;color:white;cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>⚔ PvP Leaderboard</h1>

<div class="tabs" id="tabs"></div>
<div id="list"></div>

<div class="controls">
<button onclick="login()">Admin Login</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Exit</button>
<button onclick="addPlayer()" id="addBtn" style="display:none;">Add Player</button>
<button onclick="saveData()" id="saveBtn" style="display:none;">Save</button>
</div>

</div>

<script>
let PASSWORD="1234";
let isAdmin=false;
let currentTab="overall";

/* MODES */
const modes=[
"overall","sword","crystal","pot",
"netherite","axe","uhc","smp","mace"
];

/* ICONS */
const icons={
overall:"🏆",
sword:"⚔️",
crystal:"💎",
pot:"🧪",
netherite:"🪖",
axe:"🪓",
uhc:"❤️",
smp:"🟢",
mace:"🔨"
};

const names={
overall:"Overall",
sword:"Sword",
crystal:"Crystal",
pot:"Diamond Pot",
netherite:"Netherite Pot",
axe:"Axe",
uhc:"UHC",
smp:"SMP",
mace:"Mace"
};

/* POINT SYSTEM */
const tierOrder=["LT5","HT5","LT4","HT4","LT3","HT3","LT2","HT2","LT1","HT1"];

const pointsMap={
"LT5":1,"HT5":2,
"LT4":3,"HT4":4,
"LT3":5,"HT3":6,
"LT2":7,"HT2":8,
"LT1":9,"HT1":10
};

/* LOAD DATA */
let players;
try{
players=JSON.parse(localStorage.getItem("players"));
if(!players) throw "empty";
}catch{
players=[{
name:"Niven",
modes:{
sword:"HT1",crystal:"HT2",pot:"HT1",
netherite:"HT2",axe:"HT1",uhc:"HT3",
smp:"HT1",mace:"HT5"
}
}];
}

/* POINTS */
function getTotal(p){
let total=0;
for(let m in p.modes){
total+=pointsMap[p.modes[m]]||0;
}
return total;
}

/* SORT */
function sortPlayers(){
players.sort((a,b)=>getTotal(b)-getTotal(a));
}

/* ADMIN */
function login(){
let p=prompt("Password:");
if(p===PASSWORD){
isAdmin=true;
document.getElementById("addBtn").style.display="inline-block";
document.getElementById("saveBtn").style.display="inline-block";
document.getElementById("logoutBtn").style.display="inline-block";
render();
}
}

function logout(){
isAdmin=false;
document.getElementById("addBtn").style.display="none";
document.getElementById("saveBtn").style.display="none";
document.getElementById("logoutBtn").style.display="none";
render();
}

function addPlayer(){
let obj={};
modes.forEach(m=>{
if(m!=="overall") obj[m]="HT1";
});
players.push({name:"New Player",modes:obj});
render();
}

function saveData(){
localStorage.setItem("players",JSON.stringify(players));
alert("Saved");
}

/* CLICK TO CHANGE TIER */
function nextTier(current){
let i=tierOrder.indexOf(current);
return tierOrder[(i+1)%tierOrder.length];
}

/* TABS */
function renderTabs(){
let t=document.getElementById("tabs");
t.innerHTML="";

modes.forEach(m=>{
let el=document.createElement("div");
el.className="tab"+(m===currentTab?" active":"");
el.innerText=names[m];
el.onclick=()=>{currentTab=m;render();};
t.appendChild(el);
});
}

/* RENDER */
function render(){
sortPlayers();
renderTabs();

let list=document.getElementById("list");
list.innerHTML="";

players.forEach((p,i)=>{

let row=document.createElement("div");
row.className="player";

let content="";

/* OVERALL */
if(currentTab==="overall"){
content=modes.filter(m=>m!=="overall").map(m=>{
let t=p.modes[m];
let pts=pointsMap[t]||0;

return `
<div class="iconBox" onclick="${isAdmin ? `players[${i}].modes['${m}']=nextTier('${t}');render();` : ""}">
<div class="tooltip">
<b>${t}</b><br>
${names[m]}<br>
${pts} points
</div>

<div class="circle ${t.toLowerCase()}">${icons[m]}</div>
<div class="tier">${t}</div>
</div>`;
}).join("");
}

/* SINGLE MODE */
else{
let t=p.modes[currentTab];
let pts=pointsMap[t]||0;

content=`
<div class="iconBox" onclick="${isAdmin ? `players[${i}].modes['${currentTab}']=nextTier('${t}');render();` : ""}">
<div class="tooltip">
<b>${t}</b><br>
${names[currentTab]}<br>
${pts} points
</div>

<div class="circle ${t.toLowerCase()}">${icons[currentTab]}</div>
<div class="tier">${t}</div>
</div>`;
}

row.innerHTML=`
<div class="left">
<b>#${i+1}</b>
${isAdmin
? `<input value="${p.name}" onchange="players[${i}].name=this.value">`
: `<span>${p.name}</span>`}
</div>

<div class="right">
${content}
</div>
`;

list.appendChild(row);
});
}

render();
</script>

</body>
</html>
